<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activation Code Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: {
              900: '#0f172a',
              800: '#1e293b',
              700: '#334155',
              600: '#475569',
            },
            accent: {
              500: '#10b981',
              400: '#34d399',
              300: '#6ee7b7',
            }
          }
        }
      }
    }
  </script>
  <style>
    @layer utilities {
      .text-gradient {
        background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .bg-gradient-accent {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      }
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
  </style>
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen">
  <nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 bg-dark-900/90 backdrop-blur-md">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2">
          <div class="w-10 h-10 bg-gradient-accent rounded-xl flex items-center justify-center">
            <span class="text-white font-bold text-lg">CB</span>
          </div>
          <span class="text-xl font-bold text-white">Activation Code Generator</span>
        </a>
        <a href="index.html" class="px-4 py-2 bg-dark-800 border border-dark-700 rounded-lg text-gray-400 hover:text-accent-400 hover:border-accent-500/50 transition-colors">
          Back to Main
        </a>
      </div>
    </div>
  </nav>

  <section class="pt-24 pb-12">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="text-center mb-10">
        <h1 class="text-3xl font-bold text-white mb-3">Batch Activation Code Generator</h1>
        <p class="text-gray-400">Generate 100 encrypted activation codes using Base64+XOR algorithm</p>
      </div>

      <div class="bg-dark-800 border border-dark-700 rounded-2xl p-6 sm:p-8">
        <div class="mb-6">
          <label class="block text-white font-semibold mb-2">Input Plaintext String</label>
          <input id="plaintextInput" type="text" placeholder="e.g., 1+author:zhuangchp+20260520"
            class="w-full bg-dark-900 border border-dark-600 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-accent-500 transition-colors" />
        </div>

        <button id="generateBtn" onclick="generateCodes()" class="w-full py-4 bg-gradient-accent text-white font-semibold rounded-xl hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
          Generate 100 Codes
        </button>
      </div>

      <div id="resultsContainer" class="mt-8 hidden">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold text-white">Generated Activation Codes</h2>
          <button id="copyAllBtn" onclick="copyAllCodes()" class="flex items-center gap-2 px-4 py-2 bg-dark-800 border border-dark-700 rounded-lg text-gray-400 hover:text-accent-400 hover:border-accent-500/50 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
            Copy All
          </button>
        </div>

        <div id="codesList" class="bg-dark-800 border border-dark-700 rounded-2xl p-4 max-h-96 overflow-y-auto">
        </div>

        <div class="mt-4 flex items-center justify-between text-sm text-gray-400">
          <span>Total: <span id="codesCount" class="text-accent-400 font-semibold">0</span> codes</span>
          <button id="downloadBtn" onclick="downloadCodes()" class="flex items-center gap-2 text-accent-400 hover:underline">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            Download as Text
          </button>
        </div>
      </div>
    </div>
  </section>

  <footer class="mt-12 bg-dark-800 border-t border-dark-700 py-8">
    <div class="max-w-4xl mx-auto px-4 text-center">
      <p class="text-gray-500 text-sm">Encryption: Base64 + XOR | Key: Aaron2046</p>
    </div>
  </footer>

  <script>
    const XOR_KEY = 'Aaron2046';
    var generatedCodes = [];

    function xorEncryptDecrypt(data, key) {
      var result = '';
      for (var i = 0; i < data.length; i++) {
        result += String.fromCharCode(data.charCodeAt(i) ^ key.charCodeAt(i % key.length));
      }
      return result;
    }

    function base64XorEncode(data) {
      var xorResult = xorEncryptDecrypt(data, XOR_KEY);
      return btoa(xorResult);
    }

    function generateCodes() {
      var plaintext = document.getElementById('plaintextInput').value.trim();
      
      if (!plaintext) {
        alert('Please enter a plaintext string');
        return;
      }

      var generateBtn = document.getElementById('generateBtn');
      generateBtn.innerHTML = '<svg class="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none" /><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" /></svg> Generating...';
      generateBtn.disabled = true;

      setTimeout(function() {
        generatedCodes = [];
        for (var i = 0; i < 100; i++) {
          var codeWithSuffix = plaintext + '#' + (i + 1).toString().padStart(3, '0');
          var encrypted = base64XorEncode(codeWithSuffix);
          generatedCodes.push(encrypted);
        }

        displayCodes();
        generateBtn.innerHTML = 'Generate 100 Codes';
        generateBtn.disabled = false;
      }, 500);
    }

    function displayCodes() {
      var container = document.getElementById('resultsContainer');
      var list = document.getElementById('codesList');
      var count = document.getElementById('codesCount');

      list.innerHTML = '';
      generatedCodes.forEach(function(code, index) {
        var item = document.createElement('div');
        item.className = 'flex items-center justify-between gap-4 py-2 border-b border-dark-700 last:border-b-0';
        item.innerHTML = `
          <span class="text-gray-500 text-sm w-8">#${(index + 1).toString().padStart(3, '0')}</span>
          <code class="flex-1 text-gray-300 text-sm font-mono break-all">${code}</code>
          <button onclick="copyCode('${code}', this)" class="p-1 hover:bg-dark-700 rounded transition-colors">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
          </button>
        `;
        list.appendChild(item);
      });

      count.textContent = generatedCodes.length;
      container.classList.remove('hidden');
      container.scrollIntoView({ behavior: 'smooth' });
    }

    function copyCode(code, btn) {
      navigator.clipboard.writeText(code).then(function() {
        var svg = btn.querySelector('svg');
        svg.innerHTML = '<path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" />';
        svg.classList.add('text-accent-400');
        setTimeout(function() {
          svg.innerHTML = '<path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />';
          svg.classList.remove('text-accent-400');
        }, 2000);
      });
    }

    function copyAllCodes() {
      var allText = generatedCodes.join('\n');
      navigator.clipboard.writeText(allText).then(function() {
        var btn = document.getElementById('copyAllBtn');
        var svg = btn.querySelector('svg');
        btn.innerHTML = '<svg class="w-4 h-4 text-accent-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg> Copied!';
        setTimeout(function() {
          btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg> Copy All';
        }, 2000);
      });
    }

    function downloadCodes() {
      var allText = generatedCodes.join('\n');
      var blob = new Blob([allText], { type: 'text/plain' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'activation_codes.txt';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
